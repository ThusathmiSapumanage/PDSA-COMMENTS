<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes run {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    @keyframes action {
      /* Loop: 0-3s Jump, 3-6s Crouch */
      0%, 30%, 55%, 65% { transform: translateY(0) scaleY(1); }
      41.6% { transform: translateY(-75px) scaleY(1.1); } /* Jump peak */
      85% { transform: translateY(0) scaleY(1); }
      91.6% { transform: translateY(15px) scaleY(0.6); } /* Crouch peak */
      100% { transform: translateY(0) scaleY(1); }
    }
    @keyframes moveObstacle1 {
      0% { transform: translateX(850px); opacity: 1; }
      50% { transform: translateX(-50px); opacity: 1; }
      51%, 100% { transform: translateX(850px); opacity: 0; }
    }
    @keyframes moveObstacle2 {
      0%, 49% { transform: translateX(850px); opacity: 0; }
      50% { transform: translateX(850px); opacity: 1; }
      100% { transform: translateX(-50px); opacity: 1; }
    }
    .runner { animation: run 0.2s infinite, action 6s infinite ease-in-out; transform-origin: center bottom; }
    .obs1 { animation: moveObstacle1 6s infinite linear; }
    .obs2 { animation: moveObstacle2 6s infinite linear; }
    .ground { stroke: #1A1A2E; stroke-width: 2; }
    .neon-cyan { stroke: #00F0FF; filter: drop-shadow(0 0 5px #00F0FF); }
    .neon-purple { fill: #8000FF; filter: drop-shadow(0 0 8px #8000FF); }
    .neon-pink { fill: #FF00FF; filter: drop-shadow(0 0 8px #FF00FF); }
  </style>

  <!-- Ground -->
  <line x1="0" y1="180" x2="800" y2="180" class="ground" />

  <!-- Obstacle 1 (Ground Block) -->
  <g class="obs1">
    <rect x="0" y="150" width="30" height="30" rx="4" class="neon-purple" fill-opacity="0.8" />
    <rect x="5" y="155" width="20" height="20" rx="2" stroke="#00F0FF" stroke-width="1" fill="none" />
  </g>

  <!-- Obstacle 2 (Flying Drone) -->
  <g class="obs2">
    <path d="M0 80 L35 80 L40 70 L-5 70 Z" class="neon-pink" fill-opacity="0.8" />
    <rect x="5" y="75" width="25" height="5" rx="1" fill="#00F0FF" />
    <circle cx="17.5" cy="85" r="3" fill="#00F0FF" />
  </g>

  <!-- Runner -->
  <g class="runner">
    <!-- Body -->
    <circle cx="100" cy="120" r="10" class="neon-cyan" stroke-width="3" fill="none" />
    <line x1="100" y1="130" x2="100" y2="160" class="neon-cyan" stroke-width="3" />
    <!-- Arms -->
    <line x1="100" y1="140" x2="85" y2="155" class="neon-cyan" stroke-width="3" stroke-linecap="round" />
    <line x1="100" y1="140" x2="115" y2="155" class="neon-cyan" stroke-width="3" stroke-linecap="round" />
    <!-- Legs -->
    <path id="legs" d="M100 160 L90 180 M100 160 L110 180" class="neon-cyan" stroke-width="3" stroke-linecap="round">
      <animate attributeName="d" dur="0.4s" repeatCount="indefinite" values="M100 160 L90 180 M100 160 L110 180; M100 160 L110 180 M100 160 L90 180; M100 160 L90 180 M100 160 L110 180" />
    </path>
  </g>

  <!-- Decorative grid lines -->
  <line x1="0" y1="50" x2="800" y2="50" stroke="#1A1A2E" stroke-dasharray="10 20" opacity="0.5" />
  <line x1="0" y1="100" x2="800" y2="100" stroke="#1A1A2E" stroke-dasharray="30 40" opacity="0.3" />
</svg>
